<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Christian Årebrand</title>
  <meta name="description" content="Personlig sida för Christian Årebrand." />
  <style>
    :root {
      --bg: #0f1115;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #f3f5f7;
      --muted: #b2b8c2;
      --accent: #8fb8ff;
      --accent-hover: #b7d0ff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --success: #9fe3b0;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(143, 184, 255, 0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.08), transparent 25%),
        linear-gradient(180deg, #0c0f14 0%, #12161d 100%);
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 48px 32px;
      animation: fadeInUp 0.55s ease;
      transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      border-color: rgba(143, 184, 255, 0.18);
      transform: translateY(-1px);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.02em;
      background: rgba(255, 255, 255, 0.04);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: clamp(1.05rem, 2vw, 1.2rem);
      line-height: 1.6;
      max-width: 58ch;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.96rem;
      opacity: 0.95;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(159, 227, 176, 0.12);
      flex: 0 0 auto;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
      align-items: center;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.15s ease, border-color 0.15s ease, color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .button.primary {
      background: var(--text);
      color: #0f1115;
      border: 1px solid transparent;
    }

    .button.primary:hover {
      transform: translateY(-1px);
      background: #ffffff;
    }

    .button.secondary {
      color: var(--accent);
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.03);
    }

    .button.secondary:hover {
      transform: translateY(-1px);
      color: var(--accent-hover);
      border-color: rgba(143, 184, 255, 0.45);
      box-shadow: 0 0 0 1px rgba(143, 184, 255, 0.08) inset;
    }

    .mail-button {
      cursor: default;
      user-select: none;
    }

    .mail-button:hover {
      transform: none;
      background: var(--text);
      box-shadow: none;
    }

    .mail-image {
      display: block;
      width: 100%;
      max-width: 220px;
      height: auto;
    }

    .helper-text {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      opacity: 0.86;
    }

    .meta {
      margin-top: 36px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.95rem;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
    }

    .meta span {
      opacity: 0.95;
    }
    
    .easter-egg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: grid;
      place-items: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 999;
    }

    .easter-egg.show {
      opacity: 1;
    }

    .easter-egg span {
      font-size: clamp(2rem, 9vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: rgba(255, 255, 255, 0.06);
      text-shadow: 0 0 40px rgba(143, 184, 255, 0.12);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .card {
        padding: 34px 22px;
        border-radius: 20px;
      }

      .links {
        flex-direction: column;
        align-items: stretch;
      }

      .button {
        width: 100%;
      }

      .mail-image {
        max-width: 220px;
      }

      .meta {
        gap: 8px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">arebrand.se</div>

    <h1>Christian Årebrand</h1>

    <p class="lead">
      Personal domain for contact, identity and selected links.
    </p>

    <div class="status">
      <span class="status-dot"></span>
      <span>Currently focused on turning complex systems into stable, efficient operations</span>
    </div>

    <div class="links">
      <div class="button primary mail-button" aria-label="kontakt [at] arebrand.se">
        <img src="mail.png" alt="kontakt [at] arebrand.se" class="mail-image">
      </div>

      <a class="button secondary" href="https://www.linkedin.com/in/christian-arebrand-38049488" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    </div>

    <div class="helper-text">
      Contact via LinkedIn preferred
    </div>

    <div class="meta">
      <span>Engineer</span>
      <span>Tech enthusiast</span>
      <span>Borlänge, Sweden</span>
      <span id="clock">Local time: --:--:--</span>
    </div>
  </main>

  <div class="easter-egg" id="easterEgg"><span>🎯 Bullseye!</span></div>

  <script>
    const clock = document.getElementById("clock");
    const easterEgg = document.getElementById("easterEgg");

    function updateClock() {
      const now = new Date();
      clock.textContent = "Local time: " + now.toLocaleTimeString("sv-SE");
    }

    updateClock();
    setInterval(updateClock, 1000);

    document.addEventListener("keydown", (event) => {
      if (event.key.toLowerCase() === "d") {
        easterEgg.classList.add("show");
        clearTimeout(document._eggTimeout);
        document._eggTimeout = setTimeout(() => {
          easterEgg.classList.remove("show");
        }, 900);
      }
    });
  </script>
</body>
</html>
