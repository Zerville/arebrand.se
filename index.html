<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Christian Årebrand</title>
  <meta name="description" content="Personlig sida för Christian Årebrand." />
  <style>
    :root {
      --bg: #0f1115;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #f3f5f7;
      --muted: #b2b8c2;
      --accent: #8fb8ff;
      --accent-hover: #b7d0ff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(143, 184, 255, 0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.08), transparent 25%),
        linear-gradient(180deg, #0c0f14 0%, #12161d 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 48px 32px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.02em;
      background: rgba(255, 255, 255, 0.04);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: clamp(1.05rem, 2vw, 1.2rem);
      line-height: 1.6;
      max-width: 58ch;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.15s ease, border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }

    .button.primary {
      background: var(--text);
      color: #0f1115;
      border: 1px solid transparent;
    }

    .button.primary:hover {
      transform: translateY(-1px);
      background: #ffffff;
    }

    .button.secondary {
      color: var(--accent);
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.03);
    }

    .button.secondary:hover {
      transform: translateY(-1px);
      color: var(--accent-hover);
      border-color: rgba(143, 184, 255, 0.45);
    }

    .meta {
      margin-top: 36px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.95rem;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
    }

    .meta span {
      opacity: 0.95;
    }

    @media (max-width: 640px) {
      .card {
        padding: 34px 22px;
        border-radius: 20px;
      }

      .links {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">arebrand.se</div>

    <h1>Christian Årebrand</h1>

    <p class="lead">
      Personlig domän för kontakt, identitet och utvalda länkar.
    </p>

    <div class="links">
      <a class="button primary" href="mailto:christian@arebrand.se">christian@arebrand.se</a>
      <a class="button secondary" href="https://www.linkedin.com/in/christian-arebrand-38049488" target="_blank" rel="noopener noreferrer">LinkedIn</a>
    </div>

    <div class="meta">
      <span>Engineer</span>
      <span>Tech enthusiast</span>
      <span>Borlänge, Sweden</span>
    </div>
  </main>
</body>
</html>
